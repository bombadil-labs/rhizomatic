# Publishing is cutting a tag: push `rhizomatic-vX.Y.Z` and this workflow runs the TS witness's
# full green-gate, verifies the tag matches package.json, and publishes @bombadil/rhizomatic to
# npm via TRUSTED PUBLISHING (OIDC) — no token, no secret, nothing to rotate. The registry-side
# half lives in the package's npmjs.com settings: Trusted Publisher = GitHub Actions,
# bombadil-labs/rhizomatic, workflow release.yml. Provenance is automatic under OIDC.
# workflow_dispatch exists for re-running a tag whose push predated this workflow.
name: release

on:
  push:
    tags: ["rhizomatic-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing rhizomatic-vX.Y.Z tag to publish"
        required: true

permissions:
  contents: read
  id-token: write # the OIDC token IS the publish credential

jobs:
  publish:
    name: Publish @bombadil/rhizomatic
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/ts
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: implementations/ts/package-lock.json
      - name: npm >= 11.5.1 (trusted publishing needs it; node 22 bundles npm 10)
        run: npm install -g npm@11
      - run: npm ci
      - name: tag matches package.json (a mistagged release must fail loudly)
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          PKG="rhizomatic-v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG != package version $PKG"; exit 1
          fi
      - name: green-gate (format + lint + typecheck + tests)
        run: npm run check
      - name: publish (OIDC trusted publishing; provenance automatic)
        run: npm publish
